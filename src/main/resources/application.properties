spring.application.name=bulkEmailArchitecture



# ===============================
# REDIS BASIC CONFIG
# ===============================
spring.data.redis.host=localhost
spring.data.redis.port=6379



#Rabbit MQ

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
spring.rabbitmq.listener.simple.prefetch=5

# Enable retries for RabbitMQ listeners
spring.rabbitmq.listener.simple.retry.enabled=true
# Maximum number of attempts (e.g., 3)
spring.rabbitmq.listener.simple.retry.max-attempts=3
# Delay between retries (e.g., 2 seconds)
spring.rabbitmq.listener.simple.retry.initial-interval=2000ms
# How much to increase the delay between each retry (multiplier)
spring.rabbitmq.listener.simple.retry.multiplier=2.0
# Maximum delay between retries
spring.rabbitmq.listener.simple.retry.max-interval=10000ms

# Timeout (ms)
spring.data.redis.timeout=60000

